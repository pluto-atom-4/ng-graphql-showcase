services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ng-graphql-sql-server
    user: "0:0" # Critical fix for Rootless Docker file permissions
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "P@ssw0rd1234!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql/data

volumes:
  sql-server-data:
