name: HTTP Client API Tests

on:
  push:
    branches: ["fix/github-action-http-client-test"]

  #    branches: [main, develop]
  #    paths:
  #      - "backend/src/FactoryApp.WebApi/http-tests/**"
  #      - "backend/src/**/*.cs"
  #      - ".github/workflows/http-client-tests.yml"
  #  pull_request:
  #    branches: [main, develop]
  #    paths:
  #      - "backend/src/FactoryApp.WebApi/http-tests/**"
  #      - "backend/src/**/*.cs"
  workflow_dispatch:

jobs:
  http-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Spin up SQL Server Container
        env:
          SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD }}
        run: |
          docker run -e "ACCEPT_EULA=Y" -e "MSSQL_PID=Express" -e "SA_PASSWORD=$SA_PASSWORD" \
            -p 1433:1433 \
            --name sql-server \
            -d mcr.microsoft.com/mssql/server:2022-latest

          # Wait for SQL Server to accept connections
          echo "Waiting for SQL Server to boot..."
          for i in {1..30}; do
            if docker exec sql-server /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready!"
              exit 0
            fi
            sleep 1
          done
          echo "SQL Server startup timed out"
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Restore backend dependencies
        run: dotnet restore backend/FactoryApp.slnx

      - name: Build backend
        run: dotnet build backend/FactoryApp.slnx --no-restore --configuration Release

      - name: Apply EF Core migrations
        working-directory: backend/src/FactoryApp.WebApi
        env:
          SQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD }}
        run: |
          dotnet tool install --global dotnet-ef || true
          dotnet ef database update \
            --connection "Server=127.0.0.1,1433;Database=FactoryApp;User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=false;TrustServerCertificate=true;" \
            --project ../FactoryApp.Domain/FactoryApp.Domain.csproj

      - name: Install ijhttp CLI
        run: |
          mkdir -p ijhttp-tmp
          cd ijhttp-tmp
          wget -q https://github.com/JetBrains/ijhttp/releases/latest/download/ijhttp.zip
          unzip -q ijhttp.zip
          echo "$PWD/ijhttp/bin" >> $GITHUB_PATH

      - name: Start Server and Run HTTP Tests
        working-directory: backend/src/FactoryApp.WebApi
        env:
          TEST_SEED_DATA: "true"
        run: |
          # 1. Start the server in the background
          dotnet run --no-build --configuration Release > webapi.log 2>&1 &
          BACKEND_PID=$!

          # 2. Wait for server to start up safely
          echo "Waiting for backend server to spin up..."
          SERVER_UP=false
          for i in {1..30}; do
            if curl -s http://localhost:5275/health > /dev/null 2>&1; then
              echo "Backend server is ready!"
              SERVER_UP=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_UP" != "true" ]; then
            echo "Error: Backend startup timeout"
            cat webapi.log || true
            kill $BACKEND_PID || true
            exit 1
          fi

          # 3. Run the HTTP tests while the server is alive in this shell
          echo "Running tests..."
          cd http-tests
          bash ../../../../../../scripts/run-http-tests.sh \
            --env dev \
            --report json \
            --output test-results.json
          TEST_EXIT_CODE=$?

          # 4. Gracefully kill the server inside the same process block
          echo "Cleaning up backend server process..."
          kill $BACKEND_PID || true

          # 5. Exit with the actual test result status code
          exit $TEST_EXIT_CODE
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-results
          path: backend/src/FactoryApp.WebApi/http-tests/test-results.json

      - name: Parse and report test results
        if: always()
        working-directory: backend/src/FactoryApp.WebApi/http-tests
        run: |
          if [ -f test-results.json ]; then
            echo "## HTTP Client Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            PASSED=$(jq '.passed // 0' test-results.json)
            FAILED=$(jq '.failed // 0' test-results.json)
            TOTAL=$(($PASSED + $FAILED))

            echo "- **Total Tests:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** ✅ $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** ❌ $FAILED" >> $GITHUB_STEP_SUMMARY

            if [ $FAILED -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              jq -r '.failures[]? | "- **\(.file)**: \(.message)"' test-results.json >> $GITHUB_STEP_SUMMARY || true
              exit 1
            fi
          fi
